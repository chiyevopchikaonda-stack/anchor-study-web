{% extends "base.html" %}

{% block content %}

<div class="scripture-container">

    <div class="scripture-header">
        <div class="book-icon">
            📖
        </div>

        <div>
            <h1>Daily Anchor</h1>
            <p>Your daily reminder to stay grounded</p>
        </div>
    </div>


    <div class="verse-card">

        <div class="quote-mark">
            "
        </div>


        <p class="verse-text">
            {{ verse.text }}
        </p>


        <p class="verse-reference">
            — {{ verse.ref }}
        </p>


    </div>



    <div class="reflection-card">

        <h2>
            💭 Reflection
        </h2>

        <p>
            {{ reflection }}
        </p>

    </div>



    <div class="scripture-actions">

        <button onclick="location.reload()">
            🔄 New Verse
        </button>


        <button>
            ❤️ Save Verse
        </button>

    </div>


</div>


{% endblock %}
