{% extends "base.html" %}

{% block content %}

<h1>Notes 📝</h1>

<form method="POST">
    <input type="text" name="note" placeholder="Write a note...">
    <button type="submit">Add</button>
</form>

<hr>

{% for note in notes %}
    <div style="background:#1e293b; padding:10px; margin:10px 0; border-radius:8px;">
        {{ note.content }}
    </div>
{% endfor %}

{% endblock %}
