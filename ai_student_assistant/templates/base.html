<!DOCTYPE html>
<html>
<head>
    <title>Anchor Study ⚓</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #0b1220;
            color: #e5e7eb;
        }


        /* SIDEBAR */

        .sidebar {

            width: 260px;
            background: linear-gradient(
                180deg,
                #111827,
                #0f172a
            );

            padding: 25px 20px;
            display: flex;
            flex-direction: column;

            border-right: 1px solid #1e293b;
        }


        .logo {

            text-align: center;
            margin-bottom: 35px;

        }


        .logo h2 {

            color: #60a5fa;
            margin: 0;
            font-size: 24px;

        }


        .logo p {

            color: #94a3b8;
            font-size: 13px;

        }



        /* LINKS */

        .sidebar a {

            display: flex;
            align-items: center;

            gap: 10px;

            color: #cbd5e1;

            text-decoration: none;

            padding: 13px 15px;

            margin: 6px 0;

            border-radius: 12px;

            transition: 0.3s;

            font-size: 15px;

        }



        .sidebar a:hover {

            background: #1e293b;

            color: white;

            transform: translateX(5px);

        }



        .sidebar a.active {

            background: linear-gradient(
                90deg,
                #2563eb,
                #3b82f6
            );

            color: white;

            font-weight: bold;

        }



        /* LOGOUT */

        .logout {

            margin-top: auto;

            background: #7f1d1d;

        }


        .logout:hover {

            background: #991b1b !important;

        }



        /* MAIN CONTENT */


        .main {

            flex: 1;

            padding: 35px;

            overflow-y: auto;

        }



        /* CARDS */

        .card {

            background: #111827;

            padding: 25px;

            border-radius: 18px;

            border: 1px solid #1e293b;

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);

            margin-bottom:20px;

        }



        button {

            background:#2563eb;

            color:white;

            border:none;

            padding:12px 20px;

            border-radius:10px;

            cursor:pointer;

            transition:0.3s;

        }


        button:hover {

            background:#1d4ed8;

            transform:scale(1.03);

        }



        input, textarea, select {

            width:100%;

            padding:12px;

            border-radius:10px;

            border:1px solid #334155;

            background:#0f172a;

            color:white;

            margin:8px 0;

        }



        /* LIGHT MODE */

        .light-mode {

            background:#f8fafc;

            color:#111827;

        }


        .light-mode .sidebar {

            background:#ffffff;

            border-right:1px solid #ddd;

        }


        .light-mode .sidebar a {

            color:#334155;

        }


        .light-mode .sidebar a:hover {

            background:#e2e8f0;

        }


        .light-mode .card {

            background:white;

            color:#111827;

        }
    /* SCRIPTURE CARD */

.scripture-card {

    background: linear-gradient(
        135deg,
        #1d4ed8,
        #2563eb
    );

    padding:30px;

    border-radius:20px;

    margin-bottom:25px;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.25);

}


.scripture-header {

    font-size:24px;

    font-weight:bold;

    margin-bottom:20px;

}


.verse {

    font-size:20px;

    line-height:1.6;

    font-style:italic;

}


.reference {

    margin-top:15px;

    opacity:0.8;

    font-weight:bold;

}


.scripture-btn {

    margin-top:20px;

    padding:10px 25px;

    border:none;

    border-radius:30px;

    background:white;

    color:#2563eb;

    font-weight:bold;

    cursor:pointer;

}



.scripture-btn:hover {

    transform:scale(1.05);

}





/* DASHBOARD CARDS */


.dashboard-cards {

display:flex;

gap:20px;

margin:25px 0;

}



.stat-card {

background:#1e293b;

padding:20px;

border-radius:15px;

flex:1;

text-align:center;

box-shadow:
0 5px 15px rgba(0,0,0,0.2);

}



.stat-card p {

font-size:30px;

font-weight:bold;

}





/* TASK FORM */


.task-form {

display:flex;

gap:10px;

margin-bottom:25px;

}



.task-form input {

flex:1;

padding:12px;

border-radius:10px;

border:none;

}



.task-form button {

padding:12px 20px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

cursor:pointer;

}




/* TASK ITEMS */


.task-item {

background:#1e293b;

padding:15px;

margin:10px 0;

border-radius:12px;

display:flex;

justify-content:space-between;

}



.task-item a {

margin-left:10px;

text-decoration:none;

}



.faded {

opacity:0.6;

}



.completed {

opacity:0.5;

text-decoration:line-through;

}


    </style>

</head>



<body>


<div class="sidebar">


    <div class="logo">

        <h2>⚓ Anchor Study</h2>

        <p>Your personal study companion</p>

    </div>



    <a href="/dashboard" 
    class="{% if request.path == '/dashboard' %}active{% endif %}">
        📊 Dashboard
    </a>


    <a href="/tasks"
    class="{% if request.path == '/tasks' %}active{% endif %}">
        ✅ Tasks
    </a>



    <a href="/notes"
    class="{% if request.path == '/notes' %}active{% endif %}">
        📝 Notes
    </a>



    <a href="/mood"
    class="{% if request.path == '/mood' %}active{% endif %}">
        🌤️ Mood Tracker
    </a>



    <a href="/scriptures"
    class="{% if request.path == '/scriptures' %}active{% endif %}">
        📖 Scriptures
    </a>



    <a href="/settings"
    class="{% if request.path == '/settings' %}active{% endif %}">
        ⚙️ Settings
    </a>



    <a href="/logout" class="logout">
        🚪 Logout
    </a>


</div>




<div class="main">


    {% block content %}

    {% endblock %}


</div>





<script>


function changeTheme(){

    document.body.classList.toggle("light-mode");

}



</script>



</body>
</html>
